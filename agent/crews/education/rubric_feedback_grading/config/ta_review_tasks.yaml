ta_review_task:
  description: >
    Review the AI output for a summative assessment. Inputs:
    - AI aggregate score and per-criterion scores (from
      criterion_scoring)
    - Per-sentence AI feedback (from feedback)
    - Student submission text
    - Rubric (rubric_v2.3)

    For each rubric criterion, confirm whether the AI's score and
    its cited evidence span align with your own reading of the
    submission. For each feedback sentence, confirm whether the
    cited span is in the submission and supports the sentence's
    claim.

    Decide: confirm AI output, modify specific sentences/scores,
    or override entirely. If overriding, state the justification.

    Output a JSON object:

    {{
      "decision": "confirm | modify | override",
      "justification": "...",
      "per_criterion_review": [
        {{"criterion_id": "rubric_v2.3#C1-thesis_clarity", "ai_score": 0.82, "reviewer_agrees": true, "note": "..."}},
        ...
      ],
      "feedback_modifications": [
        {{"sentence_id": "fb-03", "action": "keep|edit|remove", "rationale": "..."}},
        ...
      ],
      "alternatives_considered": [
        {{"option": "raise C2 score to 0.85", "why_rejected": "..."}},
        ...
      ]
    }}
  expected_output: >
    A structured JSON review with a decision (confirm/modify/
    override), per-criterion agreement flags, feedback-sentence
    actions, and alternatives considered. The flow records this
    output as a PROV activity and cross-references it with the
    fine-grained document-access events that the flow code
    emits around the TA activity window.
  agent: ta_review_agent
