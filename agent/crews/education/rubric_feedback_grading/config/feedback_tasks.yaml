feedback_task:
  description: >
    Consume the essay text, the rubric (rubric_v2.3), and the per-
    criterion scores from the scoring stage. For each of the four
    criteria (C1-thesis_clarity, C2-argument_quality,
    C3-evidence_integration, C4-writing_mechanics), produce 1-3
    feedback sentences. Every sentence MUST cite a specific
    evidence span in the submission by character offset + length;
    never produce an "orphan" sentence that claims to assess a
    criterion without pointing at textual evidence.

    Model context: model_version = "{model_id}",
    prompt_template_hash = "{prompt_template_hash}".

    Output a JSON array of feedback sentences, each with the
    schema:

    [
      {{
        "sentence_id": "fb-01",
        "text": "Your thesis is clearly stated in the first paragraph, but...",
        "rubric_criterion_id": "rubric_v2.3#C1-thesis_clarity",
        "evidence_span": {{"offset": 0, "length": 93}},
        "model_version": "{model_id}",
        "prompt_template_hash": "{prompt_template_hash}"
      }},
      ...
    ]

    Produce 6-10 feedback sentences total across the four criteria.
  expected_output: >
    A JSON array of 6-10 feedback-sentence objects. Each object
    names its rubric_criterion_id, evidence_span (offset + length),
    model_version, and prompt_template_hash. The array is
    downstream-consumed by the flow to emit one PAC-AI envelope
    per sentence.
  agent: feedback_agent
