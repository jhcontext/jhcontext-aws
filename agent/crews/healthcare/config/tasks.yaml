sensor_task:
  description: >
    Collect simulated clinical observations for patient {patient_id}:
    demographics (age: {age}, gender: {gender}), lab results
    ({lab_results}), imaging metadata ({imaging_metadata}).
    Output a structured JSON with all observations including
    timestamps and source system identifiers.
  expected_output: >
    Structured JSON containing patient demographics, lab results,
    and imaging metadata with SHA-256 content hashes for each
    data element.
  agent: sensor_agent

situation_task:
  description: >
    Process the sensor artifacts from the previous step. Generate
    a semantic extraction summarizing the patient's clinical
    situation: current diagnosis status, risk indicators, and
    recommended assessment priority. Follow the Explainability-First
    architecture — produce human-readable semantic summaries,
    not raw data forwarding.
  expected_output: >
    A semantic extraction in natural language describing the
    patient's clinical situation, risk level assessment, and
    key indicators that informed the assessment.
  agent: situation_agent

decision_task:
  description: >
    Consume the semantic extraction. Generate a treatment
    recommendation with: (a) recommended treatment plan,
    (b) confidence score (0-1), (c) supporting evidence
    from the semantic extraction, (d) risk assessment.
    Flag human_oversight_required=true for any case with
    confidence < 0.95 or risk_level=high.
  expected_output: >
    Treatment recommendation with confidence score, evidence
    citations, risk assessment, and human_oversight_required
    flag. Include decision_influence metadata showing which
    categories influenced the recommendation.
  agent: decision_agent

oversight_task:
  description: >
    Simulate physician review of the AI recommendation:
    1. Access original CT scan metadata (wait 4 seconds)
    2. Access treatment history (wait 3 seconds)
    3. Access pathology report (wait 2 seconds)
    4. Review AI recommendation (wait 1 second)
    Record each access as a timestamped event.
    Then either approve the recommendation or provide an
    override with clinical justification.
  expected_output: >
    Physician review report with: timestamped document access
    log, total review duration, decision (approve/override),
    and clinical justification. If overriding, specify the
    alternative treatment plan.
  agent: oversight_agent

audit_task:
  description: >
    Reconstruct the full decision chain for this case.
    Verify: (a) physician accessed source documents BEFORE
    approving/overriding the AI recommendation, (b) total
    review duration was meaningful (>5 seconds simulated),
    (c) physician exercised independent judgment (not rubber-stamp).
    Produce a structured audit report with PASS/FAIL for each check.
  expected_output: >
    Structured audit report with: decision chain reconstruction,
    temporal verification results (PASS/FAIL), human oversight
    quality assessment, and overall Article 14 compliance status.
  agent: audit_agent
